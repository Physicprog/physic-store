    <!-- GitHub Pages SPA redirect fix -->
    <script>
      (function(l){
        if(l.search[1]=='/'){
          var d=l.search.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&')}).join('?');
          window.history.replaceState(null,null,l.pathname.slice(0,-1)+d+l.hash);
        }
      }(window.location))
    </script>

    <!-- PayPal SDK — remplacez YOUR_PAYPAL_CLIENT_ID -->
    <!-- currency=EUR, intent=capture, désactive le crédit PayPal -->
    <script
      src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=EUR&intent=capture&disable-funding=credit,card"
      data-namespace="paypal"
    ></script>
